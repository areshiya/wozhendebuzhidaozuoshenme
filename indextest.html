<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球治理工具包 - 数字孪生驱动的智慧城市系统协同治理</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      text-align: center;
      color: white;
      padding: 30px 20px;
      margin-bottom: 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 15px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .header p {
      font-size: 1.2em;
      opacity: 0.95;
      max-width: 900px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .nav-tab {
      padding: 15px 30px;
      background: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.1em;
      font-weight: bold;
      color: #333;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .nav-tab:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .nav-tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .figure-container {
      display: none;
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.5s ease;
    }

    .figure-container.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .figure-container h2 {
      color: #333;
      font-size: 1.6em;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 3px solid #667eea;
    }

    .fig2-panels, .fig4-panels, .fig5-panels {
      display: grid;
      gap: 20px;
    }

    .fig2-panels {
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
    }

    .fig4-panels {
      grid-template-columns: 1fr;
    }

    .fig5-panels {
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
    }

    .panel {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      min-height: 400px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .panel-4a {
      min-height: 450px;
    }

    .rose-grid {
      width: 100%;
    }

    .footer {
      text-align: center;
      color: white;
      padding: 30px 20px;
      margin-top: 30px;
      opacity: 0.9;
    }

    .footer p {
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8em;
      }

      .header p {
        font-size: 1em;
      }

      .nav-tab {
        padding: 12px 20px;
        font-size: 1em;
      }

      .fig2-panels, .fig5-panels {
        grid-template-columns: 1fr;
      }

      .panel {
        min-height: 350px;
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌐 全球治理工具包</h1>
    <p>数字孪生驱动的智慧城市系统协同治理 - 情境校准与算法平权工具</p>
    <p style="margin-top: 10px; font-size: 0.95em; opacity: 0.85;">
      基于PRISMA指南 | 覆盖全球10个代表性城市 | 对齐联合国SDG 11.3目标
    </p>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showFigure('fig2')">Fig. 2: 多维实证诊断图谱</button>
    <button class="nav-tab" onclick="showFigure('fig4')">Fig. 4: 治理多样性图谱</button>
    <button class="nav-tab" onclick="showFigure('fig5')">Fig. 5: 全生命周期路线图</button>
  </div>

  <div id="fig2" class="figure-container active"></div>
  <div id="fig4" class="figure-container"></div>
  <div id="fig5" class="figure-container"></div>

  <div class="footer">
    <p>参考文献: 数字孪生驱动的智慧城市系统协同治理 | Nature Cities</p>
    <p>本工具包实现了论文中Fig.2、Fig.4、Fig.5的可复现可视化</p>
  </div>

  <script type="module">
    import { renderFig2 } from './src/fig2.js';
    import { renderFig4 } from './src/fig4.js';
    import { renderFig5 } from './src/fig5.js';

    // 渲染所有图表
    renderFig2(document.getElementById('fig2'));
    renderFig4(document.getElementById('fig4'));
    renderFig5(document.getElementById('fig5'));

    // 全局函数用于标签切换
    window.showFigure = function(figName) {
      // 隐藏所有图表
      document.querySelectorAll('.figure-container').forEach(el => {
        el.classList.remove('active');
      });
      
      // 移除所有活动标签
      document.querySelectorAll('.nav-tab').forEach(el => {
        el.classList.remove('active');
      });
      
      // 显示选中的图表
      document.getElementById(figName).classList.add('active');
      
      // 激活选中的标签
      event.target.classList.add('active');
      
      // 触发窗口resize事件以刷新图表
      window.dispatchEvent(new Event('resize'));
    };
  </script>
</body>
</html>
